name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
      - "grib-reader-v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify corpus fixtures are up to date
        run: |
          cargo run -p grib-reader --example sync_corpus
          git diff --exit-code

      - name: Run tests with all features
        run: cargo test --all-features

      - name: Run tests with no default features
        run: cargo test --no-default-features

      - name: Check fuzz targets
        run: cargo check --manifest-path grib-reader/fuzz/Cargo.toml --bins

      - name: Lint fuzz targets
        run: cargo clippy --manifest-path grib-reader/fuzz/Cargo.toml --bins -- -D warnings

  eccodes-interop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ecCodes test image
        run: docker build -f docker/eccodes.Dockerfile -t grib-rust-eccodes .

      - name: Run ecCodes parity tests
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace grib-rust-eccodes bash -lc '
            mkdir -p target
            cc -O2 -Wall -Wextra $(pkg-config --cflags eccodes) tools/eccodes-reference.c -o target/eccodes-reference $(pkg-config --libs eccodes)
            GRIB_READER_ECCODES_HELPER=/workspace/target/eccodes-reference /usr/local/cargo/bin/cargo test -p grib-reader --test parity_eccodes --all-features
          '

      - name: Run ecCodes benchmark harness
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace -e GRIB_READER_BENCH_ITERATIONS=3 grib-rust-eccodes bash -lc '
            mkdir -p target
            cc -O2 -Wall -Wextra $(pkg-config --cflags eccodes) tools/eccodes-reference.c -o target/eccodes-reference $(pkg-config --libs eccodes)
            GRIB_READER_ECCODES_HELPER=/workspace/target/eccodes-reference /usr/local/cargo/bin/cargo test -p grib-reader --test benchmark_eccodes --all-features -- --ignored --nocapture
          '
